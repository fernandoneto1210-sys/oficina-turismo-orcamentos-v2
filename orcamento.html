<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orçamento de Viagem — Oficina de Turismo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Adicione o CSS do Swiper aqui -->
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
  <style>
    :root{
      --azul:#346299; /* Azul mais suave */
      --azul2:#5B8DCF; /* Azul claro */
      --verde:#50997A; /* Verde mais suave */
      --verde2:#7AC2A5; /* Verde claro */
      --dourado:#D4AF37; /* Dourado um pouco mais suave */
      --dourado2:#CBB060; /* Dourado claro */
      --cinza:#F8F9FA; /* Cinza bem claro para fundo */
      --branco:#FFFFFF; /* Branco puro */
      --sombra:0 4px 20px rgba(0,0,0,.08); /* Sombra mais leve */
      --radius:12px;
      --texto-principal:#333333; /* Cor de texto mais suave */
      --texto-secundario:#666666; /* Cor de texto secundário */
      --borda-clara:#E0E0E0; /* Borda mais clara */
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cinza);color:var(--texto-principal);line-height:1.6;}
    a{text-decoration:none;color:inherit;}
    img{max-width:100%;height:auto;display:block;}

    /* ══ HEADER ══ */
    .orc-header{
      background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);
      padding:20px;text-align:center;color:var(--branco);
      box-shadow:var(--sombra);
      position:relative;
      overflow:hidden;
    }
    .orc-header .capa-bg{
      position:absolute;top:0;left:0;width:100%;height:100%;
      background-size:cover;background-position:center;
      filter:brightness(0.5) blur(3px);
      z-index:0;
      transition:background-image .5s ease-in-out;
    }
    .orc-header .header-content{
      position:relative;z-index:1;
    }
    .orc-header .logo{height:80px;margin-bottom:15px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));}
    .orc-header h1{font-size:2.2rem;margin-bottom:10px;font-weight:700;}
    .orc-header h2{font-size:1.3rem;font-weight:400;opacity:.9;}
    .orc-header .meta{font-size:.9rem;margin-top:15px;opacity:.8;}

    /* ══ CONTAINER ══ */
    .container{max-width:900px;margin:30px auto;padding:0 20px;}

    /* ══ SECTIONS ══ */
    .section{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);padding:25px;margin-bottom:25px;}
    .section h3{font-size:1.5rem;color:var(--azul);margin-bottom:20px;border-bottom:2px solid var(--borda-clara);padding-bottom:10px;}
    .section h3 i{margin-right:10px;color:var(--dourado);}

    /* ══ GALERIA ══ */
    .swiper-container {
      width: 100%;
      height: 300px; /* Altura fixa para o carrossel */
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .swiper-slide {
      text-align: center;
      font-size: 18px;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .swiper-slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .swiper-button-next, .swiper-button-prev {
      color: var(--dourado);
    }
    .swiper-pagination-bullet-active {
      background: var(--dourado);
    }

    /* ══ INCLUÍDOS / NÃO INCLUÍDOS ══ */
    .lista-itens ul{list-style:none;padding-left:0;}
    .lista-itens li{
      margin-bottom:8px;
      display:flex;
      align-items:flex-start;
      gap:10px;
      flex-direction: row;
      flex-wrap: nowrap;
    }
    .lista-itens li i{font-size:1.1rem;flex-shrink:0;}
    .lista-itens.incluidos li i{color:var(--verde);}
    .lista-itens.nao-incluidos li i{color:#e74c3c;}

    /* ══ ROTEIRO ══ */
    .roteiro-dia{margin-bottom:30px;padding-bottom:20px;border-bottom:1px dashed var(--borda-clara);}
    .roteiro-dia:last-child{border-bottom:none;margin-bottom:0;}
    .roteiro-dia h4{font-size:1.2rem;color:var(--azul2);margin-bottom:10px;}
    .roteiro-dia p{margin-bottom:10px;}
    .roteiro-dia img{border-radius:8px;margin-top:10px;max-height:250px;object-fit:cover;width:100%;}

    /* ══ VALORES ══ */
    .valores-opcoes{margin-bottom:20px;}
    .valor-opcao{background:var(--cinza);padding:15px;border-radius:var(--radius);margin-bottom:15px;}
    .valor-opcao h4{font-size:1.1rem;color:var(--azul);margin-bottom:5px;}
    .valor-opcao .preco{font-size:1.4rem;font-weight:700;color:var(--dourado);margin-bottom:5px;}
    .valor-opcao .descricao{font-size:.9rem;color:var(--texto-secundario);}
    .detalhes-pagamento p{margin-bottom:8px;}
    .detalhes-pagamento strong{color:var(--azul);} /* Destaca o texto forte */

    /* ══ ADICIONAIS ══ */
    .adicional-item{background:var(--cinza);padding:15px;border-radius:var(--radius);margin-bottom:15px;}
    .adicional-item h4{font-size:1.1rem;color:var(--azul);margin-bottom:5px;}
    .adicional-item p{font-size:.9rem;color:var(--texto-secundario);}

    /* ══ FOOTER ══ */
    .orc-footer{
      text-align:center;padding:30px 20px;
      background:#f0f0f0;color:#777;font-size:.85rem;
      margin-top:40px;
    }
    .orc-footer a{color:var(--azul);font-weight:600;}

    /* ══ MENSAGENS DE INFORMAÇÃO ══ */
    .info-message{
      background:var(--cinza);
      padding:15px;
      border-radius:var(--radius);
      text-align:center;
      color:var(--texto-secundario);
      font-style:italic;
      margin-top:10px;
    }
    .error-message{
      background:#f8d7da;
      color:#721c24;
      padding:15px;
      border-radius:var(--radius);
      text-align:center;
      margin-top:20px;
      font-weight:600;
    }
  </style>
</head>
<body>

  <header class="orc-header">
    <div id="capa-bg" class="capa-bg"></div>
    <div class="header-content">
      <img src="https://fernandoneto1210-sys.github.io/oficina-turismo-orcamentos-v2/logo.png" alt="Oficina de Turismo" class="logo">
      <h1 id="orc-titulo">Carregando Orçamento...</h1>
      <h2 id="orc-subtitulo"></h2>
      <p class="meta" id="orc-meta"></p>
    </div>
  </header>

  <main class="container">
    <!-- Seção de Galeria de Fotos -->
    <section id="galeria-section" class="section" style="display: none;">
      <h3><i class="fas fa-images"></i> Galeria de Fotos</h3>
      <div class="swiper-container">
        <div id="galeria-wrapper" class="swiper-wrapper">
          <!-- Fotos serão carregadas aqui -->
        </div>
        <!-- If we need pagination -->
        <div class="swiper-pagination"></div>
        <!-- If we need navigation buttons -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </section>

    <!-- Seção de Roteiro -->
    <section id="roteiro-section" class="section" style="display: none;">
      <h3><i class="fas fa-map-marked-alt"></i> Roteiro</h3>
      <div id="roteiro-container">
        <!-- Roteiro será carregado aqui -->
      </div>
    </section>

    <!-- Seção de Incluídos -->
    <section id="incluidos-section" class="section" style="display: none;">
      <h3><i class="fas fa-check-circle"></i> O que está incluído</h3>
      <div id="incluidos-container" class="lista-itens incluidos">
        <ul>
          <!-- Itens incluídos serão carregados aqui -->
        </ul>
      </div>
    </section>

    <!-- Seção de Não Incluídos -->
    <section id="nao-incluidos-section" class="section" style="display: none;">
      <h3><i class="fas fa-times-circle"></i> O que não está incluído</h3>
      <div id="nao-incluidos-container" class="lista-itens nao-incluidos">
        <ul>
          <!-- Itens não incluídos serão carregados aqui -->
        </ul>
      </div>
    </section>

    <!-- Seção de Valores e Investimento -->
    <section id="valores-section" class="section" style="display: none;">
      <h3><i class="fas fa-money-bill-wave"></i> Valores e Investimento</h3>
      <div id="opcoes-valores-container">
        <!-- Aqui serão renderizadas as opções de valores (se houver) -->
      </div>
      <div id="detalhes-pagamento-container">
        <!-- Aqui será renderizada a forma de pagamento (entrada e parcelamento) -->
      </div>
    </section>

    <!-- Seção Aéreo -->
    <section id="aereo-section" class="section" style="display: none;">
      <h3><i class="fas fa-plane"></i> Detalhes do Voo</h3>
      <div id="aereo-container">
        <!-- Detalhes do voo serão carregados aqui -->
      </div>
    </section>

    <!-- Seção Aluguel de Carro -->
    <section id="carro-section" class="section" style="display: none;">
      <h3><i class="fas fa-car"></i> Aluguel de Carro</h3>
      <div id="carro-container">
        <!-- Detalhes do carro serão carregados aqui -->
      </div>
    </section>

    <!-- Seção Condições Gerais -->
    <section id="condicoes-section" class="section" style="display: none;">
      <h3><i class="fas fa-file-alt"></i> Condições Gerais</h3>
      <div id="condicoes-gerais">
        <!-- Condições gerais serão carregadas aqui -->
      </div>
    </section>

    <!-- Seção Observações Importantes -->
    <section id="observacoes-section" class="section" style="display: none;">
      <h3><i class="fas fa-info-circle"></i> Observações Importantes</h3>
      <div id="observacoes">
        <!-- Observações importantes serão carregadas aqui -->
      </div>
    </section>

    <div id="error-display" class="error-message" style="display: none;"></div>

  </main>

  <footer class="orc-footer">
    <p>&copy; 2026 Oficina de Turismo. Todos os direitos reservados.</p>
    <p>Desenvolvido por <a href="https://fernandoneto1210-sys.github.io/oficina-turismo-orcamentos-v2/" target="_blank">Oficina de Turismo</a></p>
  </footer>

  <!-- Adicione o JS do Swiper aqui -->
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script>
    // ════════════════════════════════════════════
    // CONFIGURAÇÕES GLOBAIS
    // ════════════════════════════════════════════
    const JSONBIN_ID  = '6a318e1eda38895dfecb475a'; // Seu BIN ID do JSONBin.io
    const JSONBIN_KEY = '$2a$10$HTy/puCq6iupLHos/RV5DejOrnyU5.Pz18WDA4.dpmLOWJ09Rdqk.'; // Sua chave de acesso ao JSONBin.io
    const BASE_URL    = 'https://fernandoneto1210-sys.github.io/oficina-turismo-orcamentos-v2'; // URL base do seu GitHub Pages

    // ════════════════════════════════════════════
    // FUNÇÕES AUXILIARES
    // ════════════════════════════════════════════

    // Função para formatar valores monetários
    function formatarMoeda(value) {
      if (typeof value !== 'number' || isNaN(value)) {
        return 'N/A'; // Ou qualquer outro valor padrão para inválidos
      }
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(value);
    }

    // Função para formatar datas (DD/MM/AAAA)
    function formatarData(dateString) {
      if (!dateString) return '';
      try {
        const [year, month, day] = dateString.split('-');
        return `${day}/${month}/${year}`;
      } catch (e) {
        return dateString; // Retorna a string original se houver erro na formatação
      }
    }

    // Função para exibir mensagens de erro
    function displayError(message) {
      const errorDisplay = document.getElementById('error-display');
      if (errorDisplay) {
        errorDisplay.textContent = 'Erro: ' + message;
        errorDisplay.style.display = 'block';
      }
      document.querySelector('main.container').style.display = 'none'; // Esconde o conteúdo principal
    }

    // ════════════════════════════════════════════
    // CARREGAR ORÇAMENTO
    // ════════════════════════════════════════════

    async function carregarOrcamento() {
      const urlParams = new URLSearchParams(window.location.search);
      const orcamentoId = urlParams.get('id');

      if (!orcamentoId) {
        displayError('ID do orçamento não fornecido na URL.');
        return;
      }

      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
          headers: {
            'X-Master-Key': JSONBIN_KEY,
            'X-Bin-Meta': false // Para obter apenas os dados do bin
          }
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Erro ao carregar dados do JSONBin: ${response.status} - ${errorText}`);
        }

        const data = await response.json();
        const orcamento = data.find(o => o.id === orcamentoId);

        if (!orcamento) {
          displayError(`Orçamento com ID "${orcamentoId}" não encontrado.`);
          return;
        }

        renderOrcamento(orcamento);

      } catch (error) {
        console.error('Erro ao carregar orçamento:', error);
        displayError('Não foi possível carregar o orçamento. Tente novamente mais tarde.');
      }
    }

    // ════════════════════════════════════════════
    // RENDERIZAR ORÇAMENTO NA PÁGINA
    // ════════════════════════════════════════════

    function renderOrcamento(orcamento) {
      // Atualiza o cabeçalho
      document.getElementById('orc-titulo').textContent = orcamento.titulo || 'Orçamento de Viagem';
      document.getElementById('orc-subtitulo').textContent = orcamento.subtitulo || '';
      document.getElementById('orc-meta').textContent = `${orcamento.cliente || 'Cliente'} | ${orcamento.dataCriacao ? formatarData(orcamento.dataCriacao) : ''}`;

      // Define a imagem de capa via JS
      const capaBg = document.getElementById('capa-bg');
      if (orcamento.imgCapa) {
        capaBg.style.backgroundImage = `url(${orcamento.imgCapa})`;
      } else {
        capaBg.style.backgroundImage = `url(${BASE_URL}/default-capa.jpg)`; // Imagem padrão se não houver
      }

      // Galeria de Fotos
      const galeriaWrapper = document.getElementById('galeria-wrapper');
      if (orcamento.fotos && orcamento.fotos.length > 0) {
        document.getElementById('galeria-section').style.display = 'block';
        galeriaWrapper.innerHTML = ''; // Limpa antes de adicionar
        orcamento.fotos.forEach(fotoUrl => {
          const slide = document.createElement('div');
          slide.classList.add('swiper-slide');
          slide.innerHTML = `<img src="${fotoUrl}" alt="Foto do destino">`;
          galeriaWrapper.appendChild(slide);
        });
        // Inicializa o Swiper
        new Swiper('.swiper-container', {
          loop: true,
          pagination: {
            el: '.swiper-pagination',
            clickable: true,
          },
          navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
          },
        });
      } else {
        document.getElementById('galeria-section').style.display = 'none';
      }

      // Roteiro
      const roteiroContainer = document.getElementById('roteiro-container');
      if (orcamento.roteiro && orcamento.roteiro.length > 0) {
        document.getElementById('roteiro-section').style.display = 'block';
        roteiroContainer.innerHTML = ''; // Limpa antes de adicionar
        orcamento.roteiro.forEach(dia => {
          const div = document.createElement('div');
          div.classList.add('roteiro-dia');
          div.innerHTML = `
            <h4>${dia.titulo}</h4>
            <p>${dia.descricao.replace(/\n/g, '<br>')}</p>
            ${dia.foto ? `<img src="${dia.foto}" alt="Foto do dia ${dia.titulo}">` : ''}
          `;
          roteiroContainer.appendChild(div);
        });
      } else {
        document.getElementById('roteiro-section').style.display = 'none';
      }

      // Incluídos
      const incluidosContainer = document.getElementById('incluidos-container').querySelector('ul');
      if (orcamento.incluidos && orcamento.incluidos.length > 0) {
        document.getElementById('incluidos-section').style.display = 'block';
        incluidosContainer.innerHTML = ''; // Limpa antes de adicionar
        orcamento.incluidos.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<i class="fas fa-check"></i> <span>${item}</span>`;
          incluidosContainer.appendChild(li);
        });
      } else {
        document.getElementById('incluidos-section').style.display = 'none';
      }

      // Não Incluídos
      const naoIncluidosContainer = document.getElementById('nao-incluidos-container').querySelector('ul');
      if (orcamento.naoIncluidos && orcamento.naoIncluidos.length > 0) {
        document.getElementById('nao-incluidos-section').style.display = 'block';
        naoIncluidosContainer.innerHTML = ''; // Limpa antes de adicionar
        orcamento.naoIncluidos.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<i class="fas fa-times"></i> <span>${item}</span>`;
          naoIncluidosContainer.appendChild(li);
        });
      } else {
        document.getElementById('nao-incluidos-section').style.display = 'none';
      }

      // Valores e Investimento
      const valoresSection = document.getElementById('valores-section');
      const opcoesValoresContainer = document.getElementById('opcoes-valores-container');
      const detalhesPagamentoContainer = document.getElementById('detalhes-pagamento-container');
      let hasContentInValuesSection = false;

      opcoesValoresContainer.innerHTML = ''; // Limpa antes de adicionar
      detalhesPagamentoContainer.innerHTML = ''; // Limpa antes de adicionar

      // 1. Renderiza as Opções de Valores (se houver)
      if (orcamento.opcoesValores && orcamento.opcoesValores.length > 0) {
        hasContentInValuesSection = true;
        orcamento.opcoesValores.forEach(opcao => {
          const div = document.createElement('div');
          div.classList.add('valor-opcao');
          // Apenas exibe o preço se ele existir e não for "A consultar"
          const precoDisplay = (opcao.preco && opcao.preco.toLowerCase() !== 'a consultar') ?
                               `<p class="preco">${formatarMoeda(parseFloat(opcao.preco.replace('R$', '').replace('.', '').replace(',', '.')))}</p>` : '';

          div.innerHTML = `
            <h4>${opcao.titulo || 'Opção de Valor'}</h4>
            ${precoDisplay}
            <p class="descricao">${opcao.desc || ''}</p>
          `;
          opcoesValoresContainer.appendChild(div);
        });
      }

      // 2. Renderiza a Forma de Pagamento (Entrada e Parcelamento)
      let pagamentoHtml = '';
      if (orcamento.entrada && orcamento.parcelamentoTxt) {
        pagamentoHtml = `<p><strong>Entrada de ${formatarMoeda(parseFloat(orcamento.entrada.replace('R$', '').replace('.', '').replace(',', '.')))}</strong> e saldo ${orcamento.parcelamentoTxt}</p>`;
      } else if (orcamento.entrada) {
        pagamentoHtml = `<p><strong>Entrada de ${formatarMoeda(parseFloat(orcamento.entrada.replace('R$', '').replace('.', '').replace(',', '.')))}</strong></p>`;
      } else if (orcamento.parcelamentoTxt) {
        pagamentoHtml = `<p>${orcamento.parcelamentoTxt}</p>`;
      }

      // Se houver opções de valores, a forma de pagamento é um bloco separado.
      // Se não houver opções de valores, a forma de pagamento pode ser o conteúdo principal.
      if (pagamentoHtml) {
        hasContentInValuesSection = true;
        detalhesPagamentoContainer.innerHTML += `
          <div class="section-content">
            <h3>Forma de Pagamento</h3>
            ${pagamentoHtml}
          </div>
        `;
      } else if (!orcamento.opcoesValores || orcamento.opcoesValores.length === 0) {
        // Se não tem opções de valores e nem forma de pagamento, mostra mensagem de não especificado
        detalhesPagamentoContainer.innerHTML = '<p class="info-message">Detalhes de valores e pagamento não especificados.</p>';
      }

      // Exibe ou oculta a seção inteira de Valores e Investimento
      if (hasContentInValuesSection) {
        valoresSection.style.display = 'block';
      } else {
        valoresSection.style.display = 'none';
      }

      // Parte Aérea (AGORA COM OS NOVOS CAMPOS DE DATA E HORA)
      const aereoContainer = document.getElementById('aereo-container');
      if (orcamento.aereo && orcamento.aereo.length > 0) {
        document.getElementById('aereo-section').style.display = 'block';
        aereoContainer.innerHTML = ''; // Limpa antes de adicionar
        orcamento.aereo.forEach(item => {
          const div = document.createElement('div');
          div.classList.add('adicional-item');
          div.innerHTML = `
            <h4>Voo: ${item.origem || ''} &rarr; ${item.destino || ''}</h4>
            <p><strong>Cia Aérea:</strong> ${item.cia || ''}</p>
            <p><strong>Número do Voo:</strong> ${item.numVoo || ''}</p>
            <p><strong>Data Saída:</strong> ${formatarData(item.dataSaida)}</p>
            <p><strong>Hora Saída:</strong> ${item.horaSaida || ''}</p>
            <p><strong>Data Chegada:</strong> ${formatarData(item.dataChegada)}</p>
            <p><strong>Hora Chegada:</strong> ${item.horaChegada || ''}</p>
          `;
          aereoContainer.appendChild(div);
        });
      } else {
        document.getElementById('aereo-section').style.display = 'none';
      }

      // Aluguel de Carro
      const carroContainer = document.getElementById('carro-container');
      if (orcamento.carro && orcamento.carro.length > 0) {
        document.getElementById('carro-section').style.display = 'block';
        carroContainer.innerHTML = ''; // Limpa antes de adicionar
        orcamento.carro.forEach(item => {
          const div = document.createElement('div');
          div.classList.add('adicional-item');
          div.innerHTML = `
            <h4>Aluguel de Carro</h4>
            <p><strong>Retirada:</strong> ${item.localRetirada || ''}</p>
            <p><strong>Entrega:</strong> ${item.localEntrega || ''}</p>
            <p><strong>Informações:</strong> ${item.infoAdicional || ''}</p>
          `;
          carroContainer.appendChild(div);
        });
      } else {
        document.getElementById('carro-section').style.display = 'none';
      }

      // Condições Gerais
      const condicoesGeraisDiv = document.getElementById('condicoes-gerais');
      if (orcamento.condicoesGerais) {
        document.getElementById('condicoes-section').style.display = 'block';
        condicoesGeraisDiv.innerHTML = `<p>${orcamento.condicoesGerais.replace(/\n/g, '<br>')}</p>`;
      } else {
        document.getElementById('condicoes-section').style.display = 'none';
      }

      // Observações Importantes
      const observacoesDiv = document.getElementById('observacoes');
      if (orcamento.observacoes) {
        document.getElementById('observacoes-section').style.display = 'block';
        observacoesDiv.innerHTML = `<p>${orcamento.observacoes.replace(/\n/g, '<br>')}</p>`;
      } else {
        document.getElementById('observacoes-section').style.display = 'none';
      }
    }

    // ════════════════════════════════════════════
    // INICIALIZAÇÃO
    // ════════════════════════════════════════════

    document.addEventListener('DOMContentLoaded', carregarOrcamento);
  </script>
</body>
</html>
