<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin — Oficina de Turismo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{
      --azul:#1B3A6B;--azul2:#2E5FA3;--verde:#2D6A4F;--verde2:#40916C;
      --dourado:#C9A84C;--dourado2:#b8941f;--cinza:#F5F6FA;--branco:#fff;
      --sombra:0 4px 20px rgba(0,0,0,.10);--radius:12px;
      /* Novas variáveis para cores mais suaves */
      --cor-fundo-suave: #fcfdff; /* Um cinza muito claro, quase branco */
      --cor-borda-suave: #e0e7ef; /* Borda mais suave */
      --cor-texto-suave: #6b7280; /* Texto mais suave */
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cor-fundo-suave);color:#444;}
    a{text-decoration:none;color:inherit;}
    input,textarea,select,button{font-family:inherit;}

    /* ══ HEADER ══ */
    .adm-header{
      background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);
      padding:10px 24px;
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:10px;
      box-shadow:0 3px 16px rgba(0,0,0,.28);
      position:sticky;top:0;z-index:100;
    }
    .adm-logo{
      display:flex;align-items:center;gap:14px;
      background:rgba(255,255,255,.12);padding:6px 16px;
      border-radius:10px;border:1px solid rgba(255,255,255,.2);
    }
    .adm-logo img.lp{
      height:68px;width:auto;object-fit:contain;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
    }
    .adm-logo img.l30{
      height:58px;width:auto;object-fit:contain;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
      display: block; /* Garante que a logo 30 anos apareça */
    }
    .logo-sep{width:1px;height:54px;background:rgba(255,255,255,.30);}
    .adm-info .titulo{color:#fff;font-size:1rem;font-weight:700;}
    .adm-badge{
      background:var(--dourado);color:#fff;font-size:.68rem;
      font-weight:700;padding:2px 10px;border-radius:10px;
      letter-spacing:1px;width:fit-content;
    }
    .adm-header-right{display:flex;align-items:center;gap:14px;}
    .adm-header-right a{
      color:rgba(255,255,255,.75);font-size:.82rem;
      display:flex;align-items:center;gap:5px;transition:all .3s;
    }
    .adm-header-right a:hover{color:var(--dourado);}

    /* ══ STATUS BAR ══ */
    .jb-status-bar{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:7px 16px;font-size:.82rem;font-weight:600;
    }
    .jb-status-bar.ok{background:#dcfce7;color:#166534;}
    .jb-status-bar.off{background:#fef9c3;color:#854d0e;}

    /* ══ LAYOUT ══ */
    .layout{display:flex;min-height:calc(100vh - 88px);}

    /* ══ SIDEBAR ══ */
    .sidebar{
      width:290px;min-width:290px;background:#fff;
      border-right:1px solid var(--cor-borda-suave); /* Borda mais suave */
      display:flex;flex-direction:column;
      position:sticky;top:88px;
      height:calc(100vh - 88px);overflow-y:auto;
    }
    .sb-topo{padding:14px;}
    .btn-novo{
      width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
      background:linear-gradient(135deg,var(--azul),var(--azul2));
      color:#fff;border:none;cursor:pointer;
      padding:12px 16px;border-radius:var(--radius);
      font-size:.95rem;font-weight:700;transition:all .3s;
    }
    .btn-novo:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(27,58,107,.4);}
    .sb-label{
      font-size:.72rem;font-weight:700;color:var(--cor-texto-suave); /* Cor de texto mais suave */
      letter-spacing:1.5px;text-transform:uppercase;
      padding:10px 16px 6px;
    }
    .orc-lista{padding:0 8px 16px;flex:1;}
    .orc-item{
      padding:12px 14px;border-radius:10px;cursor:pointer;
      margin-bottom:6px;border:2px solid transparent;
      background:var(--cinza);transition:all .2s;
    }
    .orc-item:hover{border-color:var(--azul2);background:#fff;box-shadow:var(--sombra);}
    .orc-item.on{border-color:var(--azul);background:#fff;box-shadow:var(--sombra);}
    .orc-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px;}
    .orc-titulo{font-weight:700;font-size:.90rem;color:var(--azul);flex:1;}
    .sbadge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0;}
    .s-ativo{background:#dcfce7;color:#166534;}
    .s-rascunho{background:#fef9c3;color:#854d0e..rAll('.prev-item').forEach(item => {
        item.classList.remove('capa');
        if (item.querySelector('img').src === currentCapaUrl) {
          item.classList.add('capa');
        }
      });
      if (currentCapaUrl.includes('placeholder')) {
        capaPreview.classList.remove('capa');
      } else {
        capaPreview.classList.add('capa');
      }
    }

    function removeCapaFoto() {
      const capaPreview = document.getElementById('capa-preview');
      capaPreview.src = 'https://via.placeholder.com/200x180?text=Capa';
      capaPreview.classList.remove('capa');
      document.querySelector('#capa-preview').nextElementSibling.style.display = 'none'; // Esconde botão de remover capa
      updateCapaPreview();
    }

    // ════════════════════════════════════════════
    // INICIALIZAÇÃO E EVENT LISTENERS
    // ════════════════════════════════════════════

    document.addEventListener('DOMContentLoaded', () => {
      carregarOrcamentos();

      // Event Listeners para botões principais
      document.getElementById('btn-novo-orcamento').addEventListener('click', novoOrcamento);
      document.getElementById('btn-salvar-orcamento').addEventListener('click', salvarOrcamento);
      document.getElementById('btn-excluir-orcamento').addEventListener('click', excluirOrcamento);
      document.getElementById('btn-duplicar-orcamento').addEventListener('click', duplicarOrcamento);

      // Event Listeners para abas
      document.querySelectorAll('.abas .aba').forEach(aba => {
        aba.addEventListener('click', (e) => {
          ativarAba(e.currentTarget.dataset.painel);
        });
      });

      // Event Listeners para adicionar itens dinâmicos
      document.getElementById('btn-add-roteiro-dia').addEventListener('click', () => addRoteiroDiaItem());
      document.getElementById('btn-add-aereo').addEventListener('click', () => addAereoItem());
      document.getElementById('btn-add-carro').addEventListener('click', () => addCarroItem());
      document.getElementById('btn-add-hotel').addEventListener('click', () => addHotelItem()); // Adiciona Hotel
      document.getElementById('btn-add-opcao-valor').addEventListener('click', () => addOpcaoValorItem());

      // Event Listeners para cálculo de parcelamento
      document.getElementById('f-valor-total').addEventListener('input', calcularParcelamento);
      document.getElementById('f-valor-entrada').addEventListener('input', calcularParcelamento);
      document.getElementById('f-num-parcelas').addEventListener('input', calcularParcelamento);

      // Event Listener para upload de galeria principal
      document.getElementById('gallery-upload-input').addEventListener('change', (event) => {
        handleGalleryUpload(event, document.getElementById('gallery-upload-box'));
      });

      // Inicializa um orçamento vazio se não houver nenhum
      if (orcamentos.length === 0) {
        novoOrcamento();
      }
    });
  </script>
</body>
</html>
